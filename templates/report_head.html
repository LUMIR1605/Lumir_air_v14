<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>LUMIR SHIELD</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f8;
    color:#222;
    margin:40px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.header{
    border-bottom:3px solid #1976d2;
    padding-bottom:20px;
    margin-bottom:30px;
}

h1{
    margin:0;
    color:#1976d2;
}

.subtitle{
    color:#666;
    margin-top:8px;
}

.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:20px;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

.low{color:green;font-weight:bold;}
.medium{color:orange;font-weight:bold;}
.high{color:red;font-weight:bold;}
</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>🛡 LUMIR SHIELD</h1>

<div class="subtitle">
Executive Security Report
</div>

</div>
