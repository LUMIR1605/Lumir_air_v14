name: Shield tests

on:
  pull_request:
  push:
    branches: [main, shield/email-evidence-scoring-v1]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -q
      - run: python -m compileall shield shield.py
      - run: python -m pyflakes shield shield.py
